services:
  alloydb:
    image: google/alloydbomni:17
    container_name: alloydb-omni-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: cruddb
    ports:
      - "5432:5432"
    volumes:
      - alloydb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alloydb-crud-api
    depends_on:
      alloydb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=alloydb;Port=5432;Database=cruddb;Username=postgres;Password=devpassword"
    ports:
      - "8080:8080"

volumes:
  alloydb-data:
