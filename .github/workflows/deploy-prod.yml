name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
  CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ vars.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
  DB_CONNECTION_SECRET: ${{ vars.DB_CONNECTION_SECRET }}
  JWT_SIGNING_KEY_SECRET: ${{ vars.JWT_SIGNING_KEY_SECRET }}
  IMAGE_NAME: ${{ vars.API_IMAGE_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push API image
        run: |
          set -euo pipefail
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build --file Dockerfile --tag "$image" .
          docker push "$image"
          echo "IMAGE=$image" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run service
        run: |
          set -euo pipefail

          auth_flag="--no-allow-unauthenticated"
          if [ "${{ vars.CLOUD_RUN_ALLOW_UNAUTHENTICATED }}" = "true" ]; then
            auth_flag="--allow-unauthenticated"
          fi

          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --image "$IMAGE" \
            --service-account "$CLOUD_RUN_SERVICE_ACCOUNT" \
            --update-env-vars "ASPNETCORE_ENVIRONMENT=Production" \
            --set-secrets "ConnectionStrings__DefaultConnection=${DB_CONNECTION_SECRET}:latest,Jwt__SigningKey=${JWT_SIGNING_KEY_SECRET}:latest" \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE_CONNECTION_NAME" \
            $auth_flag

      - name: Show service URL
        run: |
          gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format "value(status.url)"
