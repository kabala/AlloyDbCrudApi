name: Migrate Production Database

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  MIGRATION_JOB: ${{ vars.MIGRATION_JOB }}
  MIGRATION_SERVICE_ACCOUNT: ${{ vars.MIGRATION_SERVICE_ACCOUNT }}
  VPC_CONNECTOR: ${{ vars.VPC_CONNECTOR }}
  MIGRATION_DB_CONNECTION_SECRET: ${{ vars.MIGRATION_DB_CONNECTION_SECRET || vars.DB_CONNECTION_SECRET }}
  IMAGE_NAME: alloydb-crud-api-migrations

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push migration image
        run: |
          set -euo pipefail
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build --file Dockerfile.migrations --tag "$image" .
          docker push "$image"
          echo "MIGRATION_IMAGE=$image" >> "$GITHUB_ENV"

      - name: Deploy Cloud Run migration job
        run: |
          set -euo pipefail
          gcloud run jobs deploy "$MIGRATION_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$MIGRATION_IMAGE" \
            --service-account "$MIGRATION_SERVICE_ACCOUNT" \
            --set-secrets "ConnectionStrings__DefaultConnection=${MIGRATION_DB_CONNECTION_SECRET}:latest" \
            --vpc-connector "$VPC_CONNECTOR" \
            --vpc-egress private-ranges-only \
            --tasks 1 \
            --max-retries 0 \
            --task-timeout 900s

      - name: Execute migration job
        run: |
          gcloud run jobs execute "$MIGRATION_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --wait
